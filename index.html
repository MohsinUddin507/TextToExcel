<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text File to Table Converter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script> <!-- SheetJS -->

    <style>
        .table-container {
            max-height: 500px;
            overflow-y: auto;
            border: 2px solid #dee2e6;
            padding: 10px;
            border-radius: 10px;
            background-color: #f8f9fa;
        }

        .table th {
            position: sticky;
            top: 0;
            background-color: #0d6efd;
            color: white;
            z-index: 10;
        }

        .bottom-space {
            margin-bottom: 50px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4 text-primary">Text File to Table Converter</h1>

        <div class="card mb-4 shadow">
            <div class="card-body">
                <h5 class="card-title">Upload File</h5>
                <div class="mb-3">
                    <label for="fileInput" class="form-label">Select pipe-delimited text file:</label>
                    <input class="form-control" type="file" id="fileInput" accept=".txt">
                </div>

                <div class="form-check mb-3">
                    <input class="form-check-input" type="radio" name="headerOption" id="withHeader" checked>
                    <label class="form-check-label" for="withHeader">First row contains headers</label>
                </div>

                <div class="form-check mb-3">
                    <input class="form-check-input" type="radio" name="headerOption" id="noHeader">
                    <label class="form-check-label" for="noHeader">No headers in file</label>
                </div>

                <button id="processBtn" class="btn btn-primary">Process File</button>
            </div>
        </div>

        <div id="resultContainer" class="hidden">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 class="text-success">Converted Table</h2>
                <button id="downloadTableBtn" class="btn btn-sm btn-success">Download Excel</button>
            </div>
            <div id="tableContainer" class="table-container mb-5"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const fileInput = document.getElementById('fileInput');
            const processBtn = document.getElementById('processBtn');
            const resultContainer = document.getElementById('resultContainer');
            const tableContainer = document.getElementById('tableContainer');
            const downloadTableBtn = document.getElementById('downloadTableBtn');

            processBtn.addEventListener('click', processFile);
            downloadTableBtn.addEventListener('click', downloadTableAsExcel);

            function processFile() {
                const file = fileInput.files[0];
                if (!file) {
                    alert('Please select a file first');
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(e) {
                    const content = e.target.result;
                    const lines = content.split('\n').filter(line => line.trim() !== '');

                    if (lines.length === 0) {
                        alert('File is empty or invalid format');
                        return;
                    }

                    const data = lines.map(line => line.split('|').map(item => item.trim()));

                    const hasHeaders = document.getElementById('withHeader').checked;
                    const tableHtml = generateBootstrapTable(data, hasHeaders);

                    tableContainer.innerHTML = tableHtml;
                    resultContainer.classList.remove('hidden');
                };
                reader.readAsText(file);
            }

            function generateBootstrapTable(data, hasHeaders) {
                let headers = [];
                let rows = [];

                if (hasHeaders) {
                    headers = data[0];
                    rows = data.slice(1);
                } else {
                    headers = data[0].map((_, i) => `Column ${i + 1}`);
                    rows = data;
                }

                let tableHtml = `
                    <table class="table table-bordered table-striped table-hover table-sm">
                        <thead class="table-primary">
                            <tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr>
                        </thead>
                        <tbody>
                            ${rows.map(row => `<tr>${row.map(cell => `<td>${cell}</td>`).join('')}</tr>`).join('')}
                        </tbody>
                    </table>
                `;

                return tableHtml;
            }

            function downloadTableAsExcel() {
                const table = tableContainer.querySelector('table');
                const workbook = XLSX.utils.table_to_book(table, { sheet: "Sheet1" });
                XLSX.writeFile(workbook, 'table.xlsx');
            }
        });
    </script>
</body>
</html>
